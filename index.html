<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liulihaocai - VIP Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            /* Nền Gradient mượt mà */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; align-items: center; justify-content: center;
            color: #1a1a1a;
            overflow: hidden;
        }

        /* --- Main Bio Container (Glassmorphism) --- */
        .bio-card {
            width: 350px;
            background: rgba(255, 255, 255, 0.5); /* Kính mờ */
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            animation: fadeIn 0.8s ease-out;
        }

        .avatar {
            width: 100px; height: 100px;
            background-color: #764ba2;
            color: #fff; font-size: 40px; font-weight: bold;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            border: 4px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .nickname { font-size: 24px; font-weight: 700; margin-bottom: 5px; color: #fff; }
        .title { font-size: 14px; color: rgba(255, 255, 255, 0.8); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }

        .social-link {
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a1a; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 12px; margin-bottom: 12px;
            border-radius: 10px;
            font-weight: 600; font-size: 15px;
            transition: 0.3s ease;
        }
        .social-link:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .social-link i { color: #764ba2; }

        /* --- Now Playing Bar (Glassmorphism) --- */
        .now-playing {
            position: fixed;
            bottom: 20px; right: 20px;
            width: 250px;
            background: rgba(255, 255, 255, 0.3); /* Kính mờ hơn */
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 10px 15px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            animation: slideIn 0.8s ease-out 0.5s both; /* Delay 0.5s */
        }

        /* Responsive: Thu nhỏ hoặc ẩn trên điện thoại */
        @media (max-width: 600px) {
            .now-playing { display: none; } /* Tạm thời ẩn trên mobile cho đơn giản */
        }

        .album-art {
            width: 40px; height: 40px;
            background: #1a1a1a;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 18px;
        }

        .music-info { flex: 1; overflow: hidden; }
        .track-name { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist-name { font-size: 11px; color: rgba(255, 255, 255, 0.7); }

        .music-controls { font-size: 14px; color: #fff; opacity: 0.7; }

        /* --- Animations --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="bio-card">
        <div class="avatar">L</div>
        <h1 class="nickname">Liulihaocai</h1>
        <p class="title">Tech Explorer | Number 1 Partner</p>
        
        <a href="https://facebook.com/Liulihaocai" target="_blank" class="social-link">
            <i class="fab fa-facebook-f"></i>Facebook
        </a>
        <a href="mailto:contact@liulihaocai.tech" class="social-link">
            <i class="fas fa-envelope"></i>Contact Me
        </a>
    </div>

    <div class="now-playing">
        <div class="album-art"><i class="fas fa-music"></i></div>
        <div class="music-info">
            <div class="track-name">0.5s TLE Runner</div>
            <div class="artist-name">Liulihaocai (Optimized Mix)</div>
        </div>
        <div class="music-controls">
            <i class="fas fa-pause"></i>
        </div>
    </div>

</body>
</html>
